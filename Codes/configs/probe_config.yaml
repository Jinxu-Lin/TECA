# Probe Experiment Configuration
# TECA: TDA-Editing Consistency Analysis

model:
  name: "gpt2-xl"
  device: "cuda"
  dtype: "float32"  # full precision for gradient accuracy

rome:
  # ROME editing parameters (EasyEdit defaults for GPT-2-XL)
  edit_layer: null  # auto-detect via causal tracing if null
  v_lr: 0.5
  v_num_grad_steps: 20
  clamp_norm_factor: 4.0
  kl_factor: 0.0625

data:
  counterfact_path: "data/counterfact.json"  # will auto-download
  num_facts: 50
  sanity_check_num: 5
  svd_diagnostic_num: 5

retrieval:
  corpus: "openwebtext"  # or "counterfact_paraphrase" for Plan B
  top_k_candidates: 100
  top_k_gradient: 10

gradient:
  method: "raw"  # raw gradient mean, no Hessian
  target: "test_prompt"  # gradient of test prompt loss w.r.t. edit layer params

null_baselines:
  null_a_num_unrelated: 10  # unrelated fact edit directions per fact
  placebo_layer_offsets: [-5, 5]  # l* +/- offset for Null-B

statistics:
  alpha: 0.05
  min_cohens_d: 0.5
  min_tecs_mean: 0.05
  angular_variance_kill_threshold: 0.001  # In ~10M-dim space, random cosine ~ 0; anything > 0 is meaningful

output:
  results_dir: "results/probe"
  figures_dir: "results/probe/figures"
